version: "3.9"

services:
  # Telegram bot (Python — unchanged)
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot   # your existing Python image
    restart: unless-stopped
    env_file: .env
    volumes:
      - data:/data
      - ./login_tokens.json:/app/login_tokens.json

  # Go web server
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      BOT_DB: /data/bot.db
      DOWNLOADS_DIR: /app/webapp_dl
      WEBAPP_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - data:/data
      - ./miniapp.html:/app/miniapp.html:ro
      - ./login_tokens.json:/app/login_tokens.json
    depends_on:
      - bot

volumes:
  data:   # shared persistent volume for bot.db
